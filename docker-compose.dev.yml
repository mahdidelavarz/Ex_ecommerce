services:
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: node_user
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U node_user -d ecommerce"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: ecommerce-backend-dev
    restart: unless-stopped
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "node", "-e", "const net=require('net');const socket=net.connect(5000,'127.0.0.1',()=>{socket.end();process.exit(0);});socket.setTimeout(2000,()=>{socket.destroy();process.exit(1);});socket.on('error',()=>process.exit(1));"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/uploads:/app/uploads
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - DB_HOST=postgres
      - DB_USERNAME=node_user
      - DB_PASSWORD=123
      - DB_NAME=ecommerce
      - CORS_ORIGIN=http://localhost:3000
      - FRONTEND_URL=http://localhost:3000
      - KAVENEGAR_API_KEY=
      - KAVENEGAR_SENDER=
      - KAVENEGAR_VERIFY_TEMPLATE=

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: ecommerce-frontend-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.local
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/next.config.ts:/app/next.config.ts
    environment:
      - WATCHPACK_POLLING=true
      - NEXT_TELEMETRY_DISABLED=1
      - API_PROXY_TARGET=http://backend:5000
      # Server-side (SSR) fetches run inside the container and can't use the
      # browser's localhost:5000 — reach the backend via its compose service name.
      - INTERNAL_API_URL=http://backend:5000/api/v1

volumes:
  postgres_data_dev:
