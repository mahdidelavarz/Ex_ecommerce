name: nazishop

services:
  postgres:
    image: postgres:16-alpine
    container_name: nazishop-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: node_user
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: ecommerce
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U node_user -d ecommerce"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nazishop-backend
    restart: unless-stopped
    expose:
      - "5000"
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      default:
      web-proxy:
        aliases:
          - nazishop-backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api/v1
        INTERNAL_API_URL: http://backend:5000/api/v1
        NEXT_PUBLIC_SITE_URL: https://thenazishop.ir
    container_name: nazishop-frontend
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - ./frontend/.env
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    depends_on:
      - backend
    networks:
      default:
      web-proxy:
        aliases:
          - nazishop-frontend

volumes:
  postgres_data:

networks:
  web-proxy:
    external: true
